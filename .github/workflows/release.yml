name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本，例如 v0.1.0；禁止 latest。"
        required: true
        type: string
      root_ref:
        description: "主仓库发布事实源：release tag、分支或 40 位 root commit；禁止 latest。"
        required: true
        type: string
      root_commit:
        description: "主仓库发布事实源 commit，必须是 40 位小写 Git SHA。"
        required: true
        type: string
      backend_commit:
        description: "期望的后端 commit，必须等于后端 native 来源记录。"
        required: true
        type: string
      openapi_snapshot_hash:
        description: "OpenAPI snapshot 集合 SHA-256；第一版由调用方显式传入。"
        required: true
        type: string
      backend_source_mode:
        description: "后端 native 来源；Actions artifact 与历史 Release asset 均可多项。"
        required: true
        type: choice
        options:
          - github-actions-artifact
          - historical-release-asset
      backend_sources_json:
        description: "后端 native 来源 JSON，格式为 {\"sources\":[...]}。"
        required: true
        type: string
      release_intent_id:
        description: "发布意图 ID，建议为 <version>:<rootCommit>。"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate-inputs:
    name: Validate release inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh
    outputs:
      version: ${{ steps.validate.outputs.version }}
      root_ref: ${{ steps.validate.outputs.root_ref }}
      root_commit: ${{ steps.validate.outputs.root_commit }}
      root_repository: ${{ steps.validate.outputs.root_repository }}
      backend_commit: ${{ steps.validate.outputs.backend_commit }}
      backend_source_mode: ${{ steps.validate.outputs.backend_source_mode }}
      backend_repo: ${{ steps.validate.outputs.backend_repo }}
      backend_owner: ${{ steps.validate.outputs.backend_owner }}
      backend_name: ${{ steps.validate.outputs.backend_name }}
      historical_release_repo: ${{ steps.validate.outputs.historical_release_repo }}
      historical_release_tag: ${{ steps.validate.outputs.historical_release_tag }}
      openapi_snapshot_hash: ${{ steps.validate.outputs.openapi_snapshot_hash }}
      release_intent_id: ${{ steps.validate.outputs.release_intent_id }}
    steps:
      - name: 校验输入与后端来源 JSON
        id: validate
        env:
          VERSION: ${{ inputs.version }}
          ROOT_REF: ${{ inputs.root_ref }}
          ROOT_COMMIT: ${{ inputs.root_commit }}
          BACKEND_COMMIT: ${{ inputs.backend_commit }}
          OPENAPI_SNAPSHOT_HASH: ${{ inputs.openapi_snapshot_hash }}
          BACKEND_SOURCE_MODE: ${{ inputs.backend_source_mode }}
          BACKEND_SOURCES_JSON: ${{ inputs.backend_sources_json }}
          RELEASE_INTENT_ID: ${{ inputs.release_intent_id }}
          ROOT_REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Assert-Pattern([string]$Name, [string]$Value, [string]$Pattern, [string]$Message) {
            if ($Value -notmatch $Pattern) {
              throw "$Name 无效：$Message"
            }
          }

          function Assert-NoLatest([string]$Name, [string]$Value) {
            if ($Value -match '(?i)latest') {
              throw "$Name 不能包含 latest：$Value"
            }
          }

          function Get-RequiredString($Object, [string]$Name) {
            $property = $Object.PSObject.Properties[$Name]
            if ($null -eq $property -or [string]::IsNullOrWhiteSpace([string]$property.Value)) {
              throw "backend_sources_json.sources[0].$Name 不能为空。"
            }
            return ([string]$property.Value).Trim()
          }

          function Get-OptionalString($Object, [string]$Name, [string]$DefaultValue) {
            $property = $Object.PSObject.Properties[$Name]
            if ($null -eq $property -or [string]::IsNullOrWhiteSpace([string]$property.Value)) {
              return $DefaultValue
            }
            return ([string]$property.Value).Trim()
          }

          $version = $env:VERSION.Trim()
          $rootRef = $env:ROOT_REF.Trim()
          $rootCommit = $env:ROOT_COMMIT.Trim()
          $backendCommit = $env:BACKEND_COMMIT.Trim()
          $openApiSnapshotHash = $env:OPENAPI_SNAPSHOT_HASH.Trim()
          $backendSourceMode = $env:BACKEND_SOURCE_MODE.Trim()
          $releaseIntentId = $env:RELEASE_INTENT_ID.Trim()
          $rootRepository = $env:ROOT_REPOSITORY.Trim()

          Assert-Pattern 'version' $version '^v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$' '必须形如 v1.2.3，可携带 prerelease 或 build metadata。'
          Assert-Pattern 'root_commit' $rootCommit '^[0-9a-f]{40}$' '必须是 40 位小写 Git SHA。'
          Assert-Pattern 'backend_commit' $backendCommit '^[0-9a-f]{40}$' '必须是 40 位小写 Git SHA。'
          Assert-Pattern 'openapi_snapshot_hash' $openApiSnapshotHash '^[0-9a-f]{64}$' '必须是 64 位小写 SHA-256。'
          Assert-Pattern 'root_repository' $rootRepository '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$' '必须形如 owner/repo。'
          Assert-NoLatest 'version' $version
          Assert-NoLatest 'root_ref' $rootRef
          Assert-NoLatest 'release_intent_id' $releaseIntentId

          if ($backendSourceMode -notin @('github-actions-artifact', 'historical-release-asset')) {
            throw "backend_source_mode 不支持：$backendSourceMode"
          }

          $payload = $env:BACKEND_SOURCES_JSON | ConvertFrom-Json -Depth 100
          $sourcesProperty = $payload.PSObject.Properties['sources']
          $sources = if ($null -ne $sourcesProperty) { @($sourcesProperty.Value) } else { @($payload) }
          if ($sources.Count -lt 1) {
            throw 'backend_sources_json 至少需要一个 sources 条目。'
          }
          for ($index = 0; $index -lt $sources.Count; $index++) {
            $modeFromJson = Get-OptionalString $sources[$index] 'type' $backendSourceMode
            if ($modeFromJson -ne $backendSourceMode) {
              throw "backend_sources_json.sources[$index].type 必须等于 backend_source_mode：期望 $backendSourceMode，实际 $modeFromJson"
            }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "root_ref=$rootRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "root_commit=$rootCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "root_repository=$rootRepository" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "backend_commit=$backendCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "backend_source_mode=$backendSourceMode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "openapi_snapshot_hash=$openApiSnapshotHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_intent_id=$releaseIntentId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($backendSourceMode -eq 'github-actions-artifact') {
            $backendRepo = ''
            $seenArtifacts = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
            foreach ($item in $sources) {
              $itemBackendRepo = Get-RequiredString $item 'backendRepository'
              $backendRunId = Get-RequiredString $item 'runId'
              $backendRunAttempt = Get-OptionalString $item 'runAttempt' '1'
              $backendArtifactName = Get-RequiredString $item 'artifactName'

              Assert-Pattern 'backendRepository' $itemBackendRepo '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$' '必须形如 owner/repo。'
              Assert-Pattern 'runId' $backendRunId '^[1-9][0-9]*$' '必须是大于 0 的整数。'
              Assert-Pattern 'runAttempt' $backendRunAttempt '^[1-9][0-9]*$' '必须是大于 0 的整数。'
              Assert-Pattern 'artifactName' $backendArtifactName '^[A-Za-z0-9][A-Za-z0-9._+@=-]*$' '必须是单个 Release artifact 名称。'
              Assert-NoLatest 'backendRepository' $itemBackendRepo
              Assert-NoLatest 'artifactName' $backendArtifactName

              if ([string]::IsNullOrWhiteSpace($backendRepo)) {
                $backendRepo = $itemBackendRepo
              }
              elseif ($backendRepo -ne $itemBackendRepo) {
                throw "github-actions-artifact 多来源必须来自同一个后端仓库：期望 $backendRepo，实际 $itemBackendRepo"
              }

              $artifactKey = "$backendRunId/$backendArtifactName"
              if (-not $seenArtifacts.Add($artifactKey)) {
                throw "backend_sources_json 中重复的后端 artifact：$artifactKey"
              }
            }

            $backendParts = $backendRepo -split '/', 2
            "backend_repo=$backendRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "backend_owner=$($backendParts[0])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "backend_name=$($backendParts[1])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            $backendRepo = ''
            $historicalReleaseRepo = ''
            $historicalReleaseTag = ''
            $seenHistoricalAssets = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)

            foreach ($item in $sources) {
              $itemHistoricalReleaseRepo = Get-RequiredString $item 'historicalReleaseRepository'
              $itemHistoricalReleaseTag = Get-RequiredString $item 'historicalReleaseTag'
              $itemHistoricalBackendAssetName = Get-RequiredString $item 'historicalBackendAssetName'
              $itemAssetSha256 = Get-RequiredString $item 'assetSha256'
              $itemAssetSizeBytes = Get-RequiredString $item 'assetSizeBytes'
              $itemBackendRepo = Get-RequiredString $item 'backendRepository'

              Assert-Pattern 'historicalReleaseRepository' $itemHistoricalReleaseRepo '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$' '必须形如 owner/repo。'
              Assert-Pattern 'historicalReleaseTag' $itemHistoricalReleaseTag '^v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$' '必须形如 v1.2.3。'
              Assert-Pattern 'historicalBackendAssetName' $itemHistoricalBackendAssetName '^[A-Za-z0-9][A-Za-z0-9._+@=-]*$' '必须是单个 Release asset 文件名。'
              Assert-Pattern 'assetSha256' $itemAssetSha256 '^[0-9a-f]{64}$' '必须是 64 位小写 SHA-256。'
              Assert-Pattern 'assetSizeBytes' $itemAssetSizeBytes '^[1-9][0-9]*$' '必须是大于 0 的整数。'
              Assert-Pattern 'backendRepository' $itemBackendRepo '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$' '必须形如 owner/repo。'
              Assert-NoLatest 'historicalReleaseRepository' $itemHistoricalReleaseRepo
              Assert-NoLatest 'historicalReleaseTag' $itemHistoricalReleaseTag
              Assert-NoLatest 'historicalBackendAssetName' $itemHistoricalBackendAssetName
              Assert-NoLatest 'backendRepository' $itemBackendRepo

              if ($itemHistoricalReleaseRepo -ne $rootRepository) {
                throw "历史 Release asset 复用来源必须是当前主仓库：期望 $rootRepository，实际 $itemHistoricalReleaseRepo"
              }

              if ([string]::IsNullOrWhiteSpace($backendRepo)) {
                $backendRepo = $itemBackendRepo
                $historicalReleaseRepo = $itemHistoricalReleaseRepo
                $historicalReleaseTag = $itemHistoricalReleaseTag
              }
              else {
                if ($backendRepo -ne $itemBackendRepo) {
                  throw "historical-release-asset 多来源必须使用同一个后端仓库：期望 $backendRepo，实际 $itemBackendRepo"
                }
                if ($historicalReleaseRepo -ne $itemHistoricalReleaseRepo -or $historicalReleaseTag -ne $itemHistoricalReleaseTag) {
                  throw "historical-release-asset 多来源第一版必须来自同一个历史 Release：期望 $historicalReleaseRepo@$historicalReleaseTag，实际 $itemHistoricalReleaseRepo@$itemHistoricalReleaseTag"
                }
              }

              if (-not $seenHistoricalAssets.Add($itemHistoricalBackendAssetName)) {
                throw "backend_sources_json 中重复的历史 Release asset：$itemHistoricalBackendAssetName"
              }
            }

            "historical_release_repo=$historicalReleaseRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "historical_release_tag=$historicalReleaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "backend_repo=$backendRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

          Write-Host "输入校验通过：version=$version mode=$backendSourceMode intent=$releaseIntentId"

  build-desktop-online:
    name: Build Desktop Online (${{ matrix.platform }})
    needs: validate-inputs
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            bundle: nsis
          - os: ubuntu-latest
            platform: linux-x64
            bundle: appimage
    env:
      VERSION: ${{ needs.validate-inputs.outputs.version }}
      ROOT_REF: ${{ needs.validate-inputs.outputs.root_ref }}
      ROOT_COMMIT: ${{ needs.validate-inputs.outputs.root_commit }}
      DESKTOP_FLAVOR: online
      DESKTOP_PRODUCT: HDX.Desktop.Online
      DESKTOP_BINARY: HDX Desktop Online
      DESKTOP_PLATFORM: ${{ matrix.platform }}
      TAURI_BUNDLE: ${{ matrix.bundle }}
    steps:
      - name: Checkout 主仓库发布事实源
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.validate-inputs.outputs.root_ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: 校验 root commit
        run: |
          $ErrorActionPreference = 'Stop'

          $actualRootCommit = (git rev-parse HEAD).Trim()
          if ($actualRootCommit -ne $env:ROOT_COMMIT) {
            throw "checkout 后 root commit 与输入不一致：输入 $env:ROOT_COMMIT，实际 $actualRootCommit"
          }

      - name: 初始化并校验 Desktop 子模块
        run: |
          $ErrorActionPreference = 'Stop'

          $desktopTree = (git ls-tree HEAD apps/desktop).Trim()
          if ($desktopTree -notmatch '^160000 commit ([0-9a-f]{40})\s+apps/desktop$') {
            throw "无法读取 apps/desktop 子模块指针：$desktopTree"
          }
          $desktopCommit = $Matches[1]

          git submodule update --init --depth 1 apps/desktop
          if ($LASTEXITCODE -ne 0) {
            throw '初始化 apps/desktop 子模块失败。'
          }

          $actualDesktopCommit = (git -C apps/desktop rev-parse HEAD).Trim()
          if ($actualDesktopCommit -ne $desktopCommit) {
            throw "apps/desktop checkout 后 commit 与 root 指针不一致：指针 $desktopCommit，实际 $actualDesktopCommit"
          }

          "DESKTOP_COMMIT=$desktopCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Desktop 子模块已初始化：$desktopCommit"

      - name: 安装 Linux Tauri 依赖
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: 设置 Desktop pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: 设置 Desktop Node 缓存
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: 准备 Desktop release Tauri 配置
        working-directory: apps/desktop
        run: |
          $ErrorActionPreference = 'Stop'

          $tauriVersion = $env:VERSION.Substring(1) -replace '\+.*$', ''
          if ($tauriVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Tauri version 无效：$tauriVersion"
          }

          $configPath = "src-tauri/tauri.$env:DESKTOP_FLAVOR.conf.json"
          $releaseConfigPath = "src-tauri/tauri.release.$env:DESKTOP_FLAVOR.conf.json"
          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json -Depth 20
          $config | Add-Member -NotePropertyName version -NotePropertyValue $tauriVersion -Force
          $config | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $releaseConfigPath

          Write-Host "Desktop release Tauri 配置已生成：$releaseConfigPath version=$tauriVersion"

      - name: 构建 Desktop Online
        working-directory: apps/desktop
        run: |
          $ErrorActionPreference = 'Stop'

          pnpm install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            throw 'Desktop 依赖安装失败。'
          }

          $arguments = @(
            'exec',
            'tauri',
            'build',
            '--config',
            "src-tauri/tauri.release.$env:DESKTOP_FLAVOR.conf.json",
            '--features',
            "flavor-$env:DESKTOP_FLAVOR",
            '--bundles',
            $env:TAURI_BUNDLE,
            '--ci'
          )
          if ($env:DESKTOP_PLATFORM -eq 'windows-x64') {
            $arguments += '--no-sign'
          }

          & pnpm @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "Desktop $env:DESKTOP_FLAVOR $env:DESKTOP_PLATFORM 构建失败。"
          }

      - name: 整理 Desktop Online Release asset
        run: |
          $ErrorActionPreference = 'Stop'

          pwsh -NoLogo -NoProfile -File scripts/package-desktop-release-assets.ps1 `
            -Version $env:VERSION `
            -Flavor $env:DESKTOP_FLAVOR `
            -Platform $env:DESKTOP_PLATFORM `
            -OutputDirectory 'target/release/desktop-assets' `
            -RootCommit $env:ROOT_COMMIT `
            -DesktopCommit $env:DESKTOP_COMMIT

      - name: 上传 Desktop Online 临时资产
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-assets-online-${{ matrix.platform }}
          path: target/release/desktop-assets/*
          if-no-files-found: error
          retention-days: 1

  assemble-draft:
    name: Assemble draft release
    needs:
      - validate-inputs
      - build-desktop-online
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    env:
      VERSION: ${{ needs.validate-inputs.outputs.version }}
      ROOT_REF: ${{ needs.validate-inputs.outputs.root_ref }}
      ROOT_COMMIT: ${{ needs.validate-inputs.outputs.root_commit }}
      ROOT_REPOSITORY: ${{ needs.validate-inputs.outputs.root_repository }}
      BACKEND_COMMIT: ${{ needs.validate-inputs.outputs.backend_commit }}
      BACKEND_SOURCE_MODE: ${{ needs.validate-inputs.outputs.backend_source_mode }}
      BACKEND_REPO: ${{ needs.validate-inputs.outputs.backend_repo }}
      BACKEND_SOURCES_JSON: ${{ inputs.backend_sources_json }}
      OPENAPI_SNAPSHOT_HASH: ${{ needs.validate-inputs.outputs.openapi_snapshot_hash }}
      RELEASE_INTENT_ID: ${{ needs.validate-inputs.outputs.release_intent_id }}
      ASSET_ROOT: target/release/assets
    steps:
      - name: Checkout 主仓库发布事实源
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ needs.validate-inputs.outputs.root_ref }}
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: 校验 root commit
        run: |
          $ErrorActionPreference = 'Stop'

          $actualRootCommit = (git rev-parse HEAD).Trim()
          if ($actualRootCommit -ne $env:ROOT_COMMIT) {
            throw "checkout 后 root commit 与输入不一致：输入 $env:ROOT_COMMIT，实际 $actualRootCommit"
          }

          $submoduleStatus = git submodule status --recursive
          if ($LASTEXITCODE -ne 0) {
            throw "读取子模块指针失败，退出码：$LASTEXITCODE"
          }

          $submoduleStatus | Set-Content -LiteralPath 'target-release-submodules.txt'
          Write-Host "root commit：$actualRootCommit"
          Write-Host '子模块只记录指针，不初始化或 checkout：'
          Get-Content -LiteralPath 'target-release-submodules.txt'

      - name: 生成后端仓库 GitHub App token
        id: backend-token
        if: ${{ needs.validate-inputs.outputs.backend_source_mode == 'github-actions-artifact' }}
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.HDX_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.HDX_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ needs.validate-inputs.outputs.backend_owner }}
          repositories: ${{ needs.validate-inputs.outputs.backend_name }}
          permission-actions: read

      - name: 下载并解析后端 Actions artifacts
        if: ${{ needs.validate-inputs.outputs.backend_source_mode == 'github-actions-artifact' }}
        env:
          GH_TOKEN: ${{ steps.backend-token.outputs.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $payload = $env:BACKEND_SOURCES_JSON | ConvertFrom-Json -Depth 100
          $sourcesProperty = $payload.PSObject.Properties['sources']
          $sources = if ($null -ne $sourcesProperty) { @($sourcesProperty.Value) } else { @($payload) }
          $resolvedSources = @()

          for ($index = 0; $index -lt $sources.Count; $index++) {
            $source = $sources[$index]
            $runId = [string]$source.runId
            $artifactName = [string]$source.artifactName
            $artifactListPayload = gh api "repos/$env:BACKEND_REPO/actions/runs/$runId/artifacts"
            if ($LASTEXITCODE -ne 0) {
              throw "读取后端 artifact 列表失败：run=$runId"
            }

            $artifacts = ($artifactListPayload | ConvertFrom-Json -Depth 20).artifacts
            $matched = @($artifacts | Where-Object { $_.name -eq $artifactName })
            if ($matched.Count -ne 1) {
              $names = @($artifacts | ForEach-Object { $_.name }) -join ', '
              throw "无法唯一定位 artifact：$artifactName；run=$runId；当前 artifacts：$names"
            }

            $artifact = $matched[0]
            if ($artifact.expired -eq $true) {
              throw "后端 artifact 已过期，需要重跑后端 native workflow：$($artifact.name)"
            }

            $downloadRoot = "target/release/download/source-$index"
            $artifactRoot = "target/release/backend-artifacts/source-$index"
            New-Item -ItemType Directory -Path $downloadRoot -Force | Out-Null
            New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null
            $zipPath = Join-Path $downloadRoot 'backend-artifact.zip'

            gh api `
              -H 'Accept: application/vnd.github+json' `
              "repos/$env:BACKEND_REPO/actions/artifacts/$($artifact.id)/zip" `
              > $zipPath
            if ($LASTEXITCODE -ne 0) {
              throw "下载后端 artifact 失败：$artifactName"
            }

            Expand-Archive -LiteralPath $zipPath -DestinationPath $artifactRoot -Force

            $resolved = [ordered]@{}
            foreach ($property in $source.PSObject.Properties) {
              $resolved[$property.Name] = $property.Value
            }
            $resolved['artifactId'] = [long]$artifact.id
            $resolved['artifactRoot'] = $artifactRoot
            $resolvedSources += $resolved

            Write-Host "artifact 下载完成：run=$runId name=$artifactName id=$($artifact.id) root=$artifactRoot"
          }

          $resolvedPayload = [ordered]@{
            sources = $resolvedSources
          }
          New-Item -ItemType Directory -Path 'target/release' -Force | Out-Null
          $resolvedPayload | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath 'target/release/backend-sources.resolved.json'

      - name: 生成并校验 Actions artifacts 聚合资产
        if: ${{ needs.validate-inputs.outputs.backend_source_mode == 'github-actions-artifact' }}
        run: |
          $ErrorActionPreference = 'Stop'

          pwsh -NoLogo -NoProfile -File scripts/release-assemble-backend-assets.ps1 `
            -SourcesJsonPath 'target/release/backend-sources.resolved.json' `
            -Version $env:VERSION `
            -RootRepository $env:ROOT_REPOSITORY `
            -RootRef $env:ROOT_REF `
            -RootCommit $env:ROOT_COMMIT `
            -BackendRepository $env:BACKEND_REPO `
            -BackendCommit $env:BACKEND_COMMIT `
            -OpenApiSnapshotHash $env:OPENAPI_SNAPSHOT_HASH `
            -OutputDirectory $env:ASSET_ROOT `
            -ExtractRoot 'target/release/extracted-actions-artifact'

      - name: 下载历史 Release 资产
        if: ${{ needs.validate-inputs.outputs.backend_source_mode == 'historical-release-asset' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HISTORICAL_RELEASE_REPO: ${{ needs.validate-inputs.outputs.historical_release_repo }}
          HISTORICAL_RELEASE_TAG: ${{ needs.validate-inputs.outputs.historical_release_tag }}
        run: |
          $ErrorActionPreference = 'Stop'

          $historicalRoot = 'target/release/historical'
          if (Test-Path -LiteralPath $historicalRoot) {
            Remove-Item -LiteralPath $historicalRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $historicalRoot | Out-Null

          $payload = $env:BACKEND_SOURCES_JSON | ConvertFrom-Json -Depth 100
          $sourcesProperty = $payload.PSObject.Properties['sources']
          $sources = if ($null -ne $sourcesProperty) { @($sourcesProperty.Value) } else { @($payload) }
          $resolvedSources = @()

          for ($index = 0; $index -lt $sources.Count; $index++) {
            $source = $sources[$index]
            $assetName = [string]$source.historicalBackendAssetName
            $sourceRoot = Join-Path $historicalRoot "source-$index"
            New-Item -ItemType Directory -Path $sourceRoot -Force | Out-Null

            gh release download $env:HISTORICAL_RELEASE_TAG `
              --repo $env:HISTORICAL_RELEASE_REPO `
              --dir $sourceRoot `
              --pattern 'release-manifest.json' `
              --pattern 'backend-native-manifest.json' `
              --pattern $assetName
            if ($LASTEXITCODE -ne 0) {
              throw "下载历史 Release asset 失败：$assetName"
            }

            foreach ($name in @('release-manifest.json', 'backend-native-manifest.json', $assetName)) {
              $path = Join-Path $sourceRoot $name
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                throw "历史 Release asset 下载后缺失：$name"
              }
            }

            $resolved = [ordered]@{}
            foreach ($property in $source.PSObject.Properties) {
              $resolved[$property.Name] = $property.Value
            }
            $resolved['historicalAssetRoot'] = $sourceRoot
            $resolvedSources += $resolved

            Write-Host "历史 asset 下载完成：tag=$env:HISTORICAL_RELEASE_TAG name=$assetName root=$sourceRoot"
          }

          $resolvedPayload = [ordered]@{
            sources = $resolvedSources
          }
          New-Item -ItemType Directory -Path 'target/release' -Force | Out-Null
          $resolvedPayload | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath 'target/release/historical-sources.resolved.json'

      - name: 生成并校验历史复用来源资产
        if: ${{ needs.validate-inputs.outputs.backend_source_mode == 'historical-release-asset' }}
        run: |
          $ErrorActionPreference = 'Stop'

          pwsh -NoLogo -NoProfile -File scripts/release-assemble-historical-backend-assets.ps1 `
            -SourcesJsonPath 'target/release/historical-sources.resolved.json' `
            -Version $env:VERSION `
            -RootRepository $env:ROOT_REPOSITORY `
            -RootRef $env:ROOT_REF `
            -RootCommit $env:ROOT_COMMIT `
            -BackendRepository $env:BACKEND_REPO `
            -BackendCommit $env:BACKEND_COMMIT `
            -OpenApiSnapshotHash $env:OPENAPI_SNAPSHOT_HASH `
            -OutputDirectory $env:ASSET_ROOT

      - name: 初始化并校验 Web 子模块
        run: |
          $ErrorActionPreference = 'Stop'

          $webTree = (git ls-tree HEAD apps/web).Trim()
          if ($webTree -notmatch '^160000 commit ([0-9a-f]{40})\s+apps/web$') {
            throw "无法读取 apps/web 子模块指针：$webTree"
          }
          $webCommit = $Matches[1]

          $webUrl = (git config -f .gitmodules --get submodule.apps/web.url).Trim()
          $webRepository = $webUrl `
            -replace '^https://github\.com/', '' `
            -replace '\.git$', ''
          if ($webRepository -notmatch '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$') {
            throw "apps/web 子模块 URL 无法解析为 GitHub 仓库：$webUrl"
          }
          if ($webRepository -match '(?i)latest') {
            throw "apps/web repository 不能包含 latest：$webRepository"
          }

          git submodule update --init --depth 1 apps/web
          if ($LASTEXITCODE -ne 0) {
            throw '初始化 apps/web 子模块失败。'
          }

          $actualWebCommit = (git -C apps/web rev-parse HEAD).Trim()
          if ($actualWebCommit -ne $webCommit) {
            throw "apps/web checkout 后 commit 与 root 指针不一致：指针 $webCommit，实际 $actualWebCommit"
          }

          "WEB_REPOSITORY=$webRepository" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WEB_COMMIT=$webCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Web 子模块已初始化：$webRepository@$webCommit"

      - name: 设置 Web Node 与 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: 设置 Web Node 缓存
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: 构建 Web node-server 资产
        working-directory: apps/web
        run: |
          $ErrorActionPreference = 'Stop'

          pnpm install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            throw 'Web 依赖安装失败。'
          }

          $webAssetOutDir = 'dist/release-assets'
          node scripts/package-node-server.mjs --version $env:VERSION --out-dir $webAssetOutDir
          if ($LASTEXITCODE -ne 0) {
            throw 'Web node-server 打包失败。'
          }

          $repoRoot = (Resolve-Path '../..').Path
          $sourceArchivePath = Join-Path (Get-Location).Path (Join-Path $webAssetOutDir "hdx-web-node-server-$env:VERSION.tar.gz")
          $assetRootPath = Join-Path $repoRoot $env:ASSET_ROOT
          New-Item -ItemType Directory -Path $assetRootPath -Force | Out-Null
          $archivePath = Join-Path $assetRootPath "hdx-web-node-server-$env:VERSION.tar.gz"
          Copy-Item -LiteralPath $sourceArchivePath -Destination $archivePath -Force
          if (-not (Test-Path -LiteralPath $archivePath -PathType Leaf)) {
            throw "Web node-server 打包完成后未找到资产：$archivePath"
          }
          Write-Host "Web node-server 资产生成：$archivePath"

      - name: 追加 Web 资产到 Release manifest
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseManifestPath = Join-Path $env:ASSET_ROOT 'release-manifest.json'
          $webArchivePath = Join-Path $env:ASSET_ROOT "hdx-web-node-server-$env:VERSION.tar.gz"
          pwsh -NoLogo -NoProfile -File scripts/release-append-web-asset.ps1 `
            -ReleaseManifestPath $releaseManifestPath `
            -WebArchivePath $webArchivePath `
            -WebRepository $env:WEB_REPOSITORY `
            -WebCommit $env:WEB_COMMIT `
            -AssetRoot $env:ASSET_ROOT

      - name: 校验 Desktop 子模块指针
        run: |
          $ErrorActionPreference = 'Stop'

          $desktopTree = (git ls-tree HEAD apps/desktop).Trim()
          if ($desktopTree -notmatch '^160000 commit ([0-9a-f]{40})\s+apps/desktop$') {
            throw "无法读取 apps/desktop 子模块指针：$desktopTree"
          }
          $desktopCommit = $Matches[1]

          $desktopUrl = (git config -f .gitmodules --get submodule.apps/desktop.url).Trim()
          $desktopRepository = $desktopUrl `
            -replace '^https://github\.com/', '' `
            -replace '\.git$', ''
          if ($desktopRepository -notmatch '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$') {
            throw "apps/desktop 子模块 URL 无法解析为 GitHub 仓库：$desktopUrl"
          }
          if ($desktopRepository -match '(?i)latest') {
            throw "apps/desktop repository 不能包含 latest：$desktopRepository"
          }

          "DESKTOP_REPOSITORY=$desktopRepository" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DESKTOP_COMMIT=$desktopCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Desktop 子模块指针：$desktopRepository@$desktopCommit"

      - name: 下载 Desktop Online 临时资产
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-assets-online-*
          path: target/release/desktop-assets
          merge-multiple: true

      - name: 追加 Desktop Online 资产到 Release manifest
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseManifestPath = Join-Path $env:ASSET_ROOT 'release-manifest.json'
          pwsh -NoLogo -NoProfile -File scripts/release-append-desktop-assets.ps1 `
            -ReleaseManifestPath $releaseManifestPath `
            -DesktopAssetsDirectory 'target/release/desktop-assets' `
            -DesktopRepository $env:DESKTOP_REPOSITORY `
            -DesktopCommit $env:DESKTOP_COMMIT `
            -AssetRoot $env:ASSET_ROOT

      - name: 创建 draft Release
        id: draft-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $existingRelease = gh release view $env:VERSION --repo $env:ROOT_REPOSITORY --json url,isDraft 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release 已存在，第一版 release.yml 不覆盖已有 Release：$existingRelease"
          }

          $tagExists = $false
          $existingTagCommit = ''
          git rev-parse -q --verify "refs/tags/$env:VERSION" *> $null
          if ($LASTEXITCODE -eq 0) {
            $tagExists = $true
            $existingTagCommit = (git rev-list -n 1 $env:VERSION).Trim()
            if ($existingTagCommit -ne $env:ROOT_COMMIT) {
              throw "同名 tag 已存在但不指向 root_commit：tag=$existingTagCommit root=$env:ROOT_COMMIT"
            }
          }

          $notesPath = 'target/release/release-notes.md'
          @(
            "HDX $env:VERSION 草稿发布"
            ''
            '本 draft 由正式 `release.yml` 第一阶段自动生成。'
            ''
            '当前限制：'
            '- 已组装后端 native 来源、Web node-server asset 和 Desktop Online asset。'
            '- 尚未构建 Desktop Full 或 App asset。'
            '- 尚不自动 publish，校验通过后仍保持 draft。'
            ''
            "release_intent_id: $env:RELEASE_INTENT_ID"
            "backend_source_mode: $env:BACKEND_SOURCE_MODE"
          ) | Set-Content -LiteralPath $notesPath

          gh release create $env:VERSION `
            --repo $env:ROOT_REPOSITORY `
            --draft `
            --target $env:ROOT_COMMIT `
            --title "HDX $env:VERSION" `
            --notes-file $notesPath
          if ($LASTEXITCODE -ne 0) {
            throw '创建 draft Release 失败。'
          }

          $release = gh release view $env:VERSION --repo $env:ROOT_REPOSITORY --json url,isDraft,tagName,targetCommitish
          if ($LASTEXITCODE -ne 0) {
            throw '读取 draft Release 失败。'
          }
          $releaseJson = $release | ConvertFrom-Json
          if ($releaseJson.isDraft -ne $true) {
            throw 'Release 创建后不是 draft，停止。'
          }

          "release_url=$($releaseJson.url)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "draft Release 创建完成：$($releaseJson.url)"
          if ($tagExists) {
            Write-Host "复用已存在 tag：$env:VERSION -> $existingTagCommit"
          }

      - name: 上传 Release 资产
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $assetPaths = @(Get-ChildItem -LiteralPath $env:ASSET_ROOT -File | Sort-Object Name | ForEach-Object { $_.FullName })
          if ($assetPaths.Count -lt 1) {
            throw '没有可上传的 Release 资产。'
          }

          gh release upload $env:VERSION @assetPaths --repo $env:ROOT_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            throw '上传 Release 资产失败。'
          }

          Write-Host 'Release 资产上传完成：'
          $assetPaths | ForEach-Object { Write-Host (Split-Path -Leaf $_) }

      - name: 远端 Release 资产校验
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $release = gh release view $env:VERSION --repo $env:ROOT_REPOSITORY --json url,isDraft,assets
          if ($LASTEXITCODE -ne 0) {
            throw '读取远端 draft Release 失败。'
          }

          $releaseJson = $release | ConvertFrom-Json -Depth 20
          if ($releaseJson.isDraft -ne $true) {
            throw '远端 Release 不是 draft，停止。'
          }

          $localAssets = @(Get-ChildItem -LiteralPath $env:ASSET_ROOT -File | Sort-Object Name)
          $remoteAssets = @($releaseJson.assets)
          foreach ($local in $localAssets) {
            $matched = @($remoteAssets | Where-Object { $_.name -eq $local.Name })
            if ($matched.Count -ne 1) {
              throw "远端 Release asset 缺失或不唯一：$($local.Name)"
            }
            if ([int64]$matched[0].size -ne [int64]$local.Length) {
              throw "远端 Release asset size 不一致：$($local.Name)，期望 $($local.Length)，实际 $($matched[0].size)"
            }
          }

          if ($remoteAssets.Count -ne $localAssets.Count) {
            $remoteNames = @($remoteAssets | ForEach-Object { $_.name }) -join ', '
            throw "远端 Release asset 数量不一致，远端资产：$remoteNames"
          }

          $downloadRoot = 'target/release/remote-assets'
          if (Test-Path -LiteralPath $downloadRoot) {
            Remove-Item -LiteralPath $downloadRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $downloadRoot | Out-Null

          gh release download $env:VERSION --repo $env:ROOT_REPOSITORY --dir $downloadRoot
          if ($LASTEXITCODE -ne 0) {
            throw '下载远端 Release asset 失败。'
          }

          foreach ($local in $localAssets) {
            $remotePath = Join-Path $downloadRoot $local.Name
            if (-not (Test-Path -LiteralPath $remotePath -PathType Leaf)) {
              throw "远端下载文件不存在：$($local.Name)"
            }
            $localHash = (Get-FileHash -LiteralPath $local.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $remoteHash = (Get-FileHash -LiteralPath $remotePath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($localHash -ne $remoteHash) {
              throw "远端 Release asset sha256 不一致：$($local.Name)，期望 $localHash，实际 $remoteHash"
            }
          }

          Write-Host "远端 draft Release asset 校验通过：$($releaseJson.url)"

      - name: 输出发布摘要
        if: always()
        env:
          RELEASE_URL: ${{ steps.draft-release.outputs.release_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          $ErrorActionPreference = 'Stop'

          $submodules = if (Test-Path -LiteralPath 'target-release-submodules.txt') {
            (Get-Content -LiteralPath 'target-release-submodules.txt' -Raw).Trim()
          }
          else {
            '未生成'
          }

          $assets = if (Test-Path -LiteralPath $env:ASSET_ROOT) {
            (Get-ChildItem -LiteralPath $env:ASSET_ROOT -File | Sort-Object Name | ForEach-Object { "- ``$($_.Name)`` ($($_.Length) bytes)" }) -join [Environment]::NewLine
          }
          else {
            '未生成'
          }

          $summary = @"
          # HDX Release

          - status: ``$env:JOB_STATUS``
          - version: ``$env:VERSION``
          - root_repository: ``$env:ROOT_REPOSITORY``
          - root_ref: ``$env:ROOT_REF``
          - root_commit: ``$env:ROOT_COMMIT``
          - backend_repo: ``$env:BACKEND_REPO``
          - backend_commit: ``$env:BACKEND_COMMIT``
          - backend_source_mode: ``$env:BACKEND_SOURCE_MODE``
          - release_intent_id: ``$env:RELEASE_INTENT_ID``
          - release_url: ``$env:RELEASE_URL``

          ## 已执行

          - 校验 release assemble 输入，禁止 ``latest``。
          - Checkout 指定 root ref，并校验 root commit。
          - 不初始化、不 checkout 后端私有子模块源码。
          - 按显式 ``backend_sources_json`` 下载后端 native 来源。
          - 初始化根仓库锁定的 ``apps/web`` 子模块，构建 Web node-server 发布包。
          - 构建 Desktop Online Windows/Linux 发布包，并追加到 ``release-manifest.json``。
          - 生成并校验包含后端、Web 与 Desktop Online 资产的 ``release-manifest.json`` 与 ``SHA256SUMS``。
          - 创建 draft Release，上传资产，并从远端下载核对 size 与 sha256。

          ## 当前限制

          - ``github-actions-artifact`` 模式支持多个后端 native asset 来源。
          - ``historical-release-asset`` 模式支持同一个历史 Release 中的多个后端 native asset 来源。
          - 第一版已构建 Web node-server asset 和 Desktop Online asset，但不构建 Desktop Full 或 App。
          - 第一版不自动 publish；校验通过后仍保持 draft。

          ## 子模块指针

          ````text
          $submodules
          ````

          ## Release 资产

          $assets
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
