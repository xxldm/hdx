# Nacos Data ID: hdx-auth-service.yml
# Group: DEFAULT_GROUP
# 内容只放非密钥配置；数据库密码通过 HDX_POSTGRES_PASSWORD 注入。

server:
  port: 18082

spring:
  datasource:
    url: jdbc:postgresql://postgres.example.internal:5432/hdx
    username: hdx
  security:
    oauth2:
      authorizationserver:
        issuer: https://auth.example.com
  flyway:
    schemas: auth
    default-schema: auth

hdx:
  runtime:
    topology: auth-service
