# Nacos Data ID: hdx-core-service.yml
# Group: DEFAULT_GROUP
# 内容只放核心服务自己的非密钥配置；公共数据库配置默认来自 hdx-database.yml。
# 如果核心服务需要单独数据库或用户名，可以在本 Data ID 中覆盖 spring.datasource.url 或 spring.datasource.username。

server:
  port: 18081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.example.com/realms/hdx

hdx:
  runtime:
    topology: core-service
