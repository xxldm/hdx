# Nacos Data ID: hdx-gateway.yml
# Group: DEFAULT_GROUP
# 内容只放非密钥配置。

server:
  port: 18080

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.example.com

hdx:
  gateway:
    routes:
      auth-uri: lb://hdx-auth-service
      core-uri: lb://hdx-core-service
  security:
    jwt:
      revocation:
        enabled: true
        key-prefix: hdx:auth
